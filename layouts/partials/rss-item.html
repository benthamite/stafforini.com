{{/*
  Shared RSS <item> template used by both _default/rss.xml and quotes/rss.xml.
  Receives a page as context (.).
*/}}
    <item>
      <title>{{ .Title | plainify }}</title>
      <link>{{ .Permalink }}</link>
      <pubDate>{{ .Date.Format "Mon, 02 Jan 2006 15:04:05 -0700" | safeHTML }}</pubDate>
      <guid>{{ .Permalink }}</guid>
      <description><![CDATA[{{ .Content | replaceRE "]]>" "]]]]><![CDATA[>" | safeHTML }}]]></description>
    </item>
