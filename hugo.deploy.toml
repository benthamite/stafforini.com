# Deploy config overlay:
#   1. Excludes heavy static directories (pdfs, pdf-thumbnails) from
#      Hugo's static mounts -- they are served directly from Cloudflare
#      R2 in production (see params.pdfBaseURL below).
#   2. Excludes static/pagefind too; the search index is built into
#      public/pagefind after Hugo runs and persists via the symlink from
#      ensure_static_symlinks.
#   3. Overrides the PDF URL params so rendered HTML points at R2.
#
# Used by scripts/deploy.sh via --config flag.

[params]
# Production PDF URLs.  Update both values after provisioning the R2
# bucket's public URL (see docs/pdf-hosting-policy.md for the setup).
# The bucket has two top-level prefixes: pdfs/ and pdf-thumbnails/.
pdfBaseURL = "https://pdf.stafforini.com"
thumbBaseURL = "https://pdf.stafforini.com"

[module]
  # Override static mounts to include only lightweight directories.
  # Heavy directories (pdfs, pdf-thumbnails, pagefind) are excluded
  # and persist in public/ across builds via symlinks.
  [[module.mounts]]
    source = "static/fonts"
    target = "static/fonts"
  [[module.mounts]]
    source = "static/images"
    target = "static/images"
  [[module.mounts]]
    source = "static/ox-hugo"
    target = "static/ox-hugo"
  [[module.mounts]]
    source = "static/ltximg"
    target = "static/ltximg"
  [[module.mounts]]
    source = "static/_redirects"
    target = "static/_redirects"
  [[module.mounts]]
    source = "static/robots.txt"
    target = "static/robots.txt"
  [[module.mounts]]
    source = "static/tango"
    target = "static/tango"
  [[module.mounts]]
    source = "static/feed"
    target = "static/feed"

  # Content, data, layouts, etc. still use default mounts.
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "data"
    target = "data"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"
