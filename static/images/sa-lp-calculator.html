.controls { display: flex; gap: 16px; align-items: center;

.controls label { font-weight: 600; font-size: 13px; }
.controls input, .controls select {
  padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px;
  font-size: 14px; background: #fff; color: #333; }
.controls input { width: 140px; }
.meta { font-size: 12px; color: #888; margin-bottom: 12px; }
.muted { color: #888; font-size: 11px; }
.table-wrap { overflow-x: auto; }
table { min-width: 100%; border-collapse: collapse; font-size: 13px;
         font-variant-numeric: tabular-nums; }
th { text-align: left; padding: 6px 6px; border-bottom: 2px solid #ddd;
      font-weight: 600; font-size: 12px; text-transform: uppercase;
      letter-spacing: 0.03em; color: #666; }
th.r, td.r { text-align: right; }
td { padding: 5px 6px; border-bottom: 1px solid #eee; }
tr:hover td { background: rgba(0,0,0,0.02); }
.tag { display: inline-block; padding: 1px 6px; border-radius: 3px;
        font-size: 11px; font-weight: 600; }
.tag-long { background: #dcfce7; color: #166534; }
.tag-call { background: #dbeafe; color: #1e40af; }
.tag-put  { background: #fee2e2; color: #991b1b; }
.summary { margin-top: 12px; font-size: 13px; display: flex;
            gap: 24px; font-weight: 500; }
.summary span { color: #666; font-weight: 400; }
td.cb { width: 24px; text-align: center; }
td.cb input { margin: 0; cursor: pointer; }
tr.excluded td { opacity: 0.35; }
tr.excluded td.cb { opacity: 1; }
body.dark { color: #d4d4d4; }
body.dark .controls input, body.dark .controls select {
  background: #2a2a2a; color: #d4d4d4; border-color: #555; }
body.dark th { color: #999; border-bottom-color: #444; }
body.dark td { border-bottom-color: #333; }
body.dark tr:hover td { background: rgba(255,255,255,0.03); }
body.dark .tag-long { background: #14532d; color: #86efac; }
body.dark .tag-call { background: #1e3a5f; color: #93c5fd; }
body.dark .tag-put  { background: #450a0a; color: #fca5a5; }
body.dark .meta { color: #777; }
body.dark tr.excluded td { opacity: 0.3; }
body.dark .summary span { color: #888; }
</style>

  html += '<div><span>' + (mode === 'full' ? 'Allocated' : 'Gross exposure') + ':</span> $' + allocated.toFixed(2) + '</div>';
  html += '<div><span>Unsized capital:</span> $' + unsizedCapital.toFixed(2) + '</div>';
  html += '<div><span>Residual:</span> $' + (bankroll - allocated - unsizedCapital).toFixed(2) + '</div>';
  html += '</div>';

  document.getElementById('output').innerHTML = html;
  // Auto-resize iframe to fit content
  try {
    var el = window.frameElement;
    if (el) el.style.height = document.body.scrollHeight + 'px';
  } catch(e) {}
}

document.getElementById('bankroll').addEventListener('input', render);
document.getElementById('mode').addEventListener('change', function() { syncCutoff(); render(); });
document.getElementById('cutoff').addEventListener('input', function() { syncCutoff(); render(); });
document.getElementById('output').addEventListener('change', function(e) {
  if (e.target.type === 'checkbox' && e.target.dataset.key) {
    if (e.target.checked) {
      delete excluded[e.target.dataset.key];
    } else {
      excluded[e.target.dataset.key] = true;
    }
    render();
  }
});

// Dark mode
function isDark() {
  try { return parent.document.documentElement.getAttribute('data-theme') === 'dark'; }
  catch(e) { return window.matchMedia('(prefers-color-scheme: dark)').matches; }
}
function applyTheme() {
  document.body.classList.toggle('dark', isDark());
}
applyTheme();
try {
  new MutationObserver(applyTheme).observe(
    parent.document.documentElement,
    { attributes: true, attributeFilter: ['data-theme'] });
} catch(e) {}

render();

</script>
</body>
</html>
