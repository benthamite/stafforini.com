<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<style>
/* reset */ * { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        sans-serif; font-size: 14px; background: transparent;
        color: #333; padding: 16px 0; }
.controls { display: flex; gap: 12px; align-items: center;
             flex-wrap: nowrap; margin-bottom: 12px; }
.control-field { display: flex; gap: 8px; align-items: center;
                 flex: 0 0 auto; }
.controls label { font-weight: 600; font-size: 13px; }
.controls input, .controls select, .controls button {
  padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px;
  font-size: 14px; background: #fff; color: #333; }
.controls button { cursor: pointer; font-weight: 600; }
#bankroll { width: 110px; }
#mode { width: 150px; }
#cutoff { width: 54px; }
.meta { font-size: 12px; color: #888; margin-bottom: 12px; }
.muted { color: #888; font-size: 11px; }
.table-wrap { overflow-x: auto; }
table { min-width: 100%; border-collapse: collapse; font-size: 13px;
         font-variant-numeric: tabular-nums; }
th { text-align: left; padding: 6px 6px; border-bottom: 2px solid #ddd;
      font-weight: 600; font-size: 12px; text-transform: uppercase;
      letter-spacing: 0.03em; color: #666; white-space: nowrap; }
th.r, td.r { text-align: right; }
td { padding: 5px 6px; border-bottom: 1px solid #eee;
     white-space: nowrap; }
tr:hover td { background: rgba(0,0,0,0.02); }
.tag { display: inline-block; padding: 1px 6px; border-radius: 3px;
        font-size: 11px; font-weight: 600; }
.tag-long { background: #dcfce7; color: #166534; }
.tag-call { background: #dbeafe; color: #1e40af; }
.tag-put  { background: #fee2e2; color: #991b1b; }
.summary { margin-top: 12px; font-size: 13px; display: flex;
            gap: 24px; font-weight: 500; }
.summary span { color: #666; font-weight: 400; }
td.cb { width: 24px; text-align: center; }
td.cb input { margin: 0; cursor: pointer; }
tr.excluded td { opacity: 0.35; }
tr.excluded td.cb { opacity: 1; }
body.dark { color: #d4d4d4; }
body.dark .controls input, body.dark .controls select,
body.dark .controls button {
  background: #2a2a2a; color: #d4d4d4; border-color: #555; }
body.dark th { color: #999; border-bottom-color: #444; }
body.dark td { border-bottom-color: #333; }
body.dark tr:hover td { background: rgba(255,255,255,0.03); }
body.dark .tag-long { background: #14532d; color: #86efac; }
body.dark .tag-call { background: #1e3a5f; color: #93c5fd; }
body.dark .tag-put  { background: #450a0a; color: #fca5a5; }
body.dark .meta { color: #777; }
body.dark tr.excluded td { opacity: 0.3; }
body.dark .summary span { color: #888; }
</style>
</head>
<body>
<div class="controls">
  <div class="control-field">
    <label for="bankroll">Bankroll ($)</label>
    <input type="number" id="bankroll" value="100000" min="0" step="100">
  </div>
  <div class="control-field">
    <label for="mode">Mode</label>
    <select id="mode">
    <option value="equity_only" selected>Equity proxy</option>
    <option value="full">Option proxy</option>
    </select>
  </div>
  <div class="control-field">
    <label id="cutoff-label" for="cutoff">Cutoff (%)</label>
    <input type="number" id="cutoff" value="0" min="0" max="100" step="0.5">
  </div>
  <div class="control-field">
    <button type="button" id="reset">Reset</button>
  </div>
</div>
<div id="mode-desc" class="meta" style="font-style:italic"></div>
<div class="meta">
  Latest disclosure: Schedule 13G filed 2026-05-27: NBIS 12,410,060 shares (5.6%) &middot; underlying prices as of 2026-05-29
</div>
<div id="output"></div>
<script>

var DATA = {
  equity_only: [{"ticker": "NBIS", "type": "long", "reported_value": 2585884141.6, "source": "Schedule 13G", "shares": 12410060, "percent": 5.6, "event_date": "2026-05-19", "filing_date": "2026-05-27", "instrument": "stock", "price": 231.09, "underlying_price": 231.09, "multiplier": 1, "direction": "long", "capital_basis": 2585884141.604004, "cutoff_basis": 2585884141.604004, "weight": 1.0, "cutoff_weight": 1.0}],
  full: [{"ticker": "NBIS", "type": "long", "reported_value": 2585884141.6, "source": "Schedule 13G", "shares": 12410060, "percent": 5.6, "event_date": "2026-05-19", "filing_date": "2026-05-27", "instrument": "stock", "price": 231.09, "underlying_price": 231.09, "multiplier": 1, "direction": "long", "capital_basis": 2585884141.604004, "cutoff_basis": 2585884141.604004, "weight": 1.0, "cutoff_weight": 1.0}]
};

var excluded = {};
function posKey(r) { return r.ticker + '_' + r.type; }
function validBasis(r) {
  return typeof r.capital_basis === 'number' &&
         isFinite(r.capital_basis) &&
         r.capital_basis > 0;
}
function esc(value) {
  return String(value == null ? '' : value).replace(/[&<>"']/g, function(ch) {
    return {
      '&': '&amp;', '<': '&lt;', '>': '&gt;',
      '"': '&quot;', "'": '&#39;'
    }[ch];
  });
}

function syncCutoff() {
  var cutoff = (parseFloat(document.getElementById('cutoff').value) || 0) / 100;
  var mode = document.getElementById('mode').value;
  var rows = DATA[mode];
  excluded = {};
  rows.forEach(function(r) {
    var cutoffWeight = typeof r.cutoff_weight === 'number' ?
                       r.cutoff_weight : r.weight;
    if (cutoffWeight < cutoff) {
      excluded[posKey(r)] = true;
    }
  });
}

function resetCalculator() {
  document.getElementById('bankroll').value = '100000';
  document.getElementById('mode').value = 'equity_only';
  document.getElementById('cutoff').value = '0';
  syncCutoff();
  render();
}

function render() {
  var bankroll = parseFloat(document.getElementById('bankroll').value) || 0;
  var mode = document.getElementById('mode').value;
  var rows = DATA[mode];
  var showOptionDetails = mode === 'full';

  // Show mode description
  var descEl = document.getElementById('mode-desc');
  var cutoffLabel = document.getElementById('cutoff-label');
  if (mode === 'equity_only') {
    descEl.textContent = 'Uses shares only; weight and cutoff are gross underlying exposure.';
    cutoffLabel.textContent = 'Cutoff (%)';
  } else {
    descEl.textContent = 'Uses deployed capital; cutoff filters stocks by notional and options by delta-adjusted notional.';
    cutoffLabel.textContent = 'Cutoff (%)';
  }

  // All rows shown; excluded rows are greyed out
  var active = rows.filter(function(r) {
    return !excluded[posKey(r)] && validBasis(r);
  });
  var totalBasis = active.reduce(function(s, r) {
    return s + r.capital_basis;
  }, 0);

  var allocated = 0;
  var unsizedCapital = 0;
  var computed = rows.map(function(r) {
    var key = posKey(r);
    var isExcl = !!excluded[key];
    var hasBasis = validBasis(r);
    var adjWeight = (!isExcl && hasBasis && totalBasis > 0) ?
                    r.capital_basis / totalBasis : 0;
    var scale = (!isExcl && hasBasis && totalBasis > 0) ?
                bankroll / totalBasis : 0;
    var notionalTarget = (!isExcl && hasBasis) ? r.reported_value * scale : null;
    var premiumTarget = (!isExcl && hasBasis) ?
                        r.capital_basis * scale : 0;
    var multiplier = r.multiplier || 1;
    var isOption = r.instrument === 'option';
    var direction = r.direction || 'long';
    var sizingPrice = isOption ? r.underlying_price : r.price;
    if (!sizingPrice || !r.price || isExcl || !hasBasis) {
      if (!isExcl && hasBasis) unsizedCapital += premiumTarget;
      return { ticker: r.ticker, type: r.type, weight: r.weight,
                            adjWeight: adjWeight,
                            premiumTarget: premiumTarget,
                            notionalTarget: notionalTarget,
                            excluded: isExcl, key: key,
                            instrument: r.instrument || 'stock',
                            strike: r.strike || null, expiry: r.expiry || null,
                            underlyingPrice: r.underlying_price || null,
                            priceAsOf: r.price_as_of || null,
                            direction: direction,
                            price: r.price, units: null, cost: null };
    }
    var units = Math.floor(notionalTarget / (sizingPrice * multiplier));
    var signedUnits = direction === 'short' ? -units : units;
    var cost = units * r.price * multiplier;
    allocated += cost;
    return { ticker: r.ticker, type: r.type, weight: r.weight,
              adjWeight: adjWeight,
              premiumTarget: premiumTarget,
              notionalTarget: notionalTarget,
              excluded: isExcl, key: key, instrument: r.instrument || 'stock',
              strike: r.strike || null, expiry: r.expiry || null,
              underlyingPrice: r.underlying_price || null,
              priceAsOf: r.price_as_of || null,
              direction: direction,
              price: r.price, units: signedUnits, cost: cost };
  });

  var html = '<div class="table-wrap"><table><thead><tr>';
  html += '<th></th><th>Ticker</th>';
  html += '<th>Type</th>';
  if (showOptionDetails) html += '<th class="r">Strike</th><th class="r">Expiry</th>';
  html += '<th class="r">Weight</th>';
  if (showOptionDetails) {
    html += '<th class="r">Premium Target</th>';
    html += '<th class="r">Notional Target</th>';
  } else {
    html += '<th class="r">Target</th>';
  }
  html += '<th class="r">Price</th>';
  html += '<th class="r">Units</th><th class="r">Cost</th></tr></thead><tbody>';

  computed.forEach(function(c) {
    html += '<tr' + (c.excluded ? ' class="excluded"' : '') + '>';
    html += '<td class="cb"><input type="checkbox" data-key="' + esc(c.key) + '"' + (c.excluded ? '' : ' checked') + '></td>';
    html += '<td><strong>' + esc(c.ticker) + '</strong></td>';
    var cls = c.type === 'put' ? 'tag-put' : c.type === 'call' ? 'tag-call' : 'tag-long';
    var typeText = c.type;
    if (mode === 'equity_only' && c.type === 'call') typeText = 'call as long';
    if (mode === 'equity_only' && c.type === 'put') typeText = 'put as short';
    html += '<td><span class="tag ' + cls + '">' + esc(typeText) + '</span></td>';
    if (showOptionDetails) {
      if (c.strike) {
        html += '<td class="r">$' + c.strike.toFixed(0) + '</td>';
        html += '<td class="r">' + esc(c.expiry || '\u2014') + '</td>';
      } else {
        html += '<td class="r">\u2014</td><td class="r">\u2014</td>';
      }
    }
    html += '<td class="r">' + (c.excluded ? '0.0' : (c.adjWeight * 100).toFixed(1)) + '%</td>';
    if (showOptionDetails) {
      html += '<td class="r">' + (c.excluded ? '$0.00' : '$' + c.premiumTarget.toFixed(2)) + '</td>';
      html += '<td class="r">' + (c.excluded ? '$0.00' : (c.notionalTarget == null ? 'N/A' : '$' + c.notionalTarget.toFixed(2))) + '</td>';
    } else {
      html += '<td class="r">' + (c.excluded ? '$0.00' : (c.notionalTarget == null ? 'N/A' : '$' + c.notionalTarget.toFixed(2))) + '</td>';
    }
    var priceText = c.price != null ? '$' + c.price.toFixed(2) : 'N/A';
    html += '<td class="r">' + priceText + '</td>';
    html += '<td class="r">' + (c.units != null ? c.units.toLocaleString() : 'N/A') + '</td>';
    html += '<td class="r">' + (c.cost != null ? '$' + c.cost.toFixed(2) : 'N/A') + '</td>';
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  html += '<div class="summary">';
  html += '<div><span>' + (mode === 'full' ? 'Allocated' : 'Gross exposure') + ':</span> $' + allocated.toFixed(2) + '</div>';
  html += '<div><span>Unsized capital:</span> $' + unsizedCapital.toFixed(2) + '</div>';
  html += '<div><span>Residual:</span> $' + (bankroll - allocated - unsizedCapital).toFixed(2) + '</div>';
  html += '</div>';

  document.getElementById('output').innerHTML = html;
  // Auto-resize iframe to fit content
  try {
    var el = window.frameElement;
    if (el) el.style.height = document.body.scrollHeight + 'px';
  } catch(e) {}
}

document.getElementById('bankroll').addEventListener('input', render);
document.getElementById('mode').addEventListener('change', function() { syncCutoff(); render(); });
document.getElementById('cutoff').addEventListener('input', function() { syncCutoff(); render(); });
document.getElementById('reset').addEventListener('click', resetCalculator);
document.getElementById('output').addEventListener('change', function(e) {
  if (e.target.type === 'checkbox' && e.target.dataset.key) {
    if (e.target.checked) {
      delete excluded[e.target.dataset.key];
    } else {
      excluded[e.target.dataset.key] = true;
    }
    render();
  }
});

// Dark mode
function isDark() {
  try { return parent.document.documentElement.getAttribute('data-theme') === 'dark'; }
  catch(e) { return window.matchMedia('(prefers-color-scheme: dark)').matches; }
}
function applyTheme() {
  document.body.classList.toggle('dark', isDark());
}
applyTheme();
try {
  new MutationObserver(applyTheme).observe(
    parent.document.documentElement,
    { attributes: true, attributeFilter: ['data-theme'] });
} catch(e) {}

render();

</script>
</body>
</html>
