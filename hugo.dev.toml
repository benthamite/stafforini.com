# Dev-only config overlay for the common note-editing workflow.
#
# It deliberately mounts only notes, quotes, posts, and the root/search pages from
# content/.  Mounting the full content tree makes `hugo server` load ~25K work
# pages into its object graph; even if those pages are configured with
# build.render = "link", the server still opens tens of thousands of files and
# can wedge while browser requests wait forever.
#
# Full deploys still use hugo.deploy.toml and render the complete site.
#
# PDFs and thumbnails are still served via symlinks created by
# start-dev-server.sh.  Search is unavailable during dev; run
# `npm run reindex` if needed.
#
# Used by scripts/start-dev-server.sh via --config flag.

[module]
  # Override static mounts to include only lightweight directories.
  # Hugo's default mount maps the entire static/ directory; specifying
  # explicit mounts replaces that default.  Heavy directories (pdfs,
  # pdf-thumbnails, pagefind) are excluded here and served via symlinks.
  [[module.mounts]]
    source = "static/fonts"
    target = "static/fonts"
  [[module.mounts]]
    source = "static/images"
    target = "static/images"
  [[module.mounts]]
    source = "static/ox-hugo"
    target = "static/ox-hugo"
  [[module.mounts]]
    source = "static/ltximg"
    target = "static/ltximg"

  # Content is intentionally narrowed for local preview.  The full work-page
  # corpus is omitted from the default dev server because it dominates startup
  # time and file descriptor usage. Quotes remain mounted because the home page
  # includes a recent-quotes section.
  [[module.mounts]]
    source = "content/_index.md"
    target = "content/_index.md"
  [[module.mounts]]
    source = "content/search.md"
    target = "content/search.md"
  [[module.mounts]]
    source = "content/notes"
    target = "content/notes"
  [[module.mounts]]
    source = "content/quotes"
    target = "content/quotes"
  [[module.mounts]]
    source = "content/posts"
    target = "content/posts"
  [[module.mounts]]
    source = "data"
    target = "data"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"
