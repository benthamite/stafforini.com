baseURL = "https://stafforini.com/"
languageCode = "en"
title = "Pablo Stafforini"

# Preserve the natural case of taxonomy terms, section titles, etc.
# With the default "ap" style, Hugo rewrites "Effective altruism" as
# "Effective Altruism" on tag pages, which we don't want.
titleCaseStyle = "none"

# Degrade broken relref shortcodes to warnings instead of build errors.
# The custom ID link handler in export-notes.el resolves most ID links, but
# this safety net prevents build failures if any relref slips through.
refLinksErrorLevel = "WARNING"

[params]
# Base URLs for PDF assets.  Local dev serves from static/ via hugo server.
# Production overrides in hugo.deploy.toml with the R2 public URL so deploys
# don't carry the 50 GB PDF tree through Netlify.
pdfBaseURL = "/pdfs"
thumbBaseURL = "/pdf-thumbnails"

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      # Allow raw HTML in Markdown output (required for ox-hugo HTML blocks and citeproc output)
      unsafe = true
    [markup.goldmark.extensions.typographer]
      enable = true
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['$$', '$$'], ['\[', '\]']]
        inline = [['\(', '\)']]
  [markup.highlight]
    noClasses = false
    lineNos = false
    guessSyntax = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

# Permalinks
[permalinks]
  notes = "/notes/:contentbasename/"
  quotes = "/quotes/:contentbasename/"
  works = "/works/:contentbasename/"

# Menu
[menus]
  [[menus.main]]
    name = "Notes"
    pageRef = "/notes/"
    weight = 1
  [[menus.main]]
    name = "Quotes"
    pageRef = "/quotes/"
    weight = 2
  [[menus.main]]
    name = "Emacs"
    pageRef = "/notes/my-emacs-packages/"
    weight = 3
  [[menus.main]]
    name = "About"
    pageRef = "/notes/about/"
    weight = 4

# Output formats
[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "index"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[taxonomies]
  tag = "tags"

# Pagination (controls quotes per page in the /quotes/ feed)
[pagination]
  pagerSize = 20
