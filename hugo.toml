baseURL = "https://stafforini.com/"
languageCode = "en"
title = "Pablo Stafforini"

# Degrade broken relref shortcodes to warnings instead of build errors.
# The custom ID link handler in export-notes.el resolves most ID links, but
# this safety net prevents build failures if any relref slips through.
refLinksErrorLevel = "WARNING"

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      # Allow raw HTML in Markdown output (required for ox-hugo HTML blocks and citeproc output)
      unsafe = true
    [markup.goldmark.extensions.typographer]
      enable = true
    [markup.goldmark.extensions.passthrough]
      enable = true
      [markup.goldmark.extensions.passthrough.delimiters]
        block = [['$$', '$$'], ['\[', '\]']]
        inline = [['\(', '\)']]
  [markup.highlight]
    noClasses = false
    lineNos = false
    guessSyntax = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

# Permalinks
[permalinks]
  notes = "/notes/:contentbasename/"
  quotes = "/quotes/:contentbasename/"
  works = "/works/:contentbasename/"

# Menu
[menus]
  [[menus.main]]
    name = "Notes"
    pageRef = "/notes/"
    weight = 1
  [[menus.main]]
    name = "Quotes"
    pageRef = "/quotes/"
    weight = 2

# Output formats
[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "index"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

# Disable taxonomies (backlinks-as-taxonomy instead)
[taxonomies]

# Pagination (controls quotes per page in the /quotes/ feed)
[pagination]
  pagerSize = 20
