name: SA-LP filing watcher

on:
  schedule:
    # Every five minutes. GitHub Actions may delay scheduled runs under load,
    # but five minutes is the shortest supported interval.
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      test_alert:
        description: Send a clearly labeled test notification instead of polling SEC.
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: sa-lp-filing-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit state + feed updates back to the repo.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run poller
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.SA_LP_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.SA_LP_TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SA_LP_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SA_LP_SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SA_LP_SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SA_LP_SMTP_PASSWORD }}
          NOTIFY_EMAIL_FROM: ${{ secrets.SA_LP_NOTIFY_EMAIL_FROM }}
          NOTIFY_EMAIL_TO: ${{ secrets.SA_LP_NOTIFY_EMAIL_TO }}
        run: |
          if [[ "${{ inputs.test_alert }}" == "true" ]]; then
            python3 scripts/sa-lp-13f-check.py --test-alert
          else
            python3 scripts/sa-lp-13f-check.py
          fi

      - name: Commit state if changed
        run: |
          if [[ -z "$(git status --porcelain data/sa-lp-13f-state.json)" ]]; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/sa-lp-13f-state.json
          git commit -m "sa-lp: record new filing"
          git push
