[build]
command = "echo 'ERROR: Builds are deployed via scripts/deploy.sh, not Netlify CI.' && exit 1"
publish = "public"

# These versions are informational only — builds are deployed locally via
# scripts/deploy.sh, not by Netlify CI (the build command above errors out).
[build.environment]
HUGO_VERSION = "0.151.2"
NODE_VERSION = "20"

[[headers]]
for = "/*"
  [headers.values]
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
  X-Frame-Options = "SAMEORIGIN"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Permissions-Policy = "camera=(), microphone=(), geolocation=()"
  # Content-Security-Policy breakdown:
  #   default-src 'self'          — only load resources from this origin by default
  #   script-src  'unsafe-inline' — required for Hugo's inline dark-mode script (FOUC prevention)
  #               'wasm-unsafe-eval' — required for Pagefind's WebAssembly search engine
  #                cdn.jsdelivr.net — KaTeX JS
  #                cdn.plot.ly     — Plotly charts (situational-awareness-lp)
  #   style-src   'unsafe-inline' — required for KaTeX inline styles
  #                cdn.jsdelivr.net — KaTeX CSS
  #   font-src    'self'          — only local fonts (Source Serif 4)
  #   img-src     'self' data:    — data: URIs used by KaTeX for rendering
  #                pdf.stafforini.com — PDF first-page thumbnails served from R2
  #   connect-src 'self'          — Pagefind search fetches index fragments via fetch()
  Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdn.jsdelivr.net https://cdn.plot.ly; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self'; img-src 'self' data: https://pdf.stafforini.com; media-src 'self'; connect-src 'self'"

[[headers]]
for = "/fonts/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable" # 1 year in seconds

# CSS/JS use stable filenames (no fingerprint — see head.html / load-js.html).
# must-revalidate forces browsers to check ETag on every request, so edits
# propagate immediately while unchanged assets still get served as 304.
[[headers]]
for = "/css/*"
  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/js/*"
  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

# Permissive CSP for the archived WordPress tango blog under /tango/*.
# The mirrored pages embed YouTube/Spotify iframes, Facebook widgets, and
# Google Docs references that the site-wide CSP would block.  This override
# widens CSP for this subtree only; the rest of the site keeps the strict
# policy defined above.
[[headers]]
for = "/tango/*"
  [headers.values]
  Content-Security-Policy = "default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; img-src * data: blob:; media-src * data: blob:; frame-src https:; connect-src https:; font-src 'self' https: data:"

# RSS feed redirects (preserve subscribers from WordPress)
[[redirects]]
from = "/feed/"
to = "/notes/index.xml"
status = 301

[[redirects]]
from = "/feed"
to = "/notes/index.xml"
status = 301

[[redirects]]
from = "/blog/feed/"
to = "/notes/index.xml"
status = 301

[[redirects]]
from = "/blog/feed"
to = "/notes/index.xml"
status = 301

[[redirects]]
from = "/tango/feed/"
to = "/notes/index.xml"
status = 301

[[redirects]]
from = "/tango/feed"
to = "/notes/index.xml"
status = 301

# force = true is required because /quotes/ exists as a static page;
# without it Netlify serves the HTML and ignores the query-string redirect.
[[redirects]]
from = "/quotes/"
query = { feed = "rss2" }
to = "/quotes/index.xml"
status = 301
force = true

# General blog → notes redirect
[[redirects]]
from = "/blog/*"
to = "/notes/:splat"
status = 301
